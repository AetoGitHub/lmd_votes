<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensajes</title>
</head>
<body>
    <h1>Mensajes guardados</h1>

    {% for season in season %}
        <div>
            <strong>{{ season.name }}</strong>
            <small></small>
        </div>
        <hr>
    {% empty %}
        <p>No hay mensajes aún.</p>
    {% endfor %}

    <a href="{% url 'mensaje_nuevo' %}">Agregar mensaje</a>
</body>
</html>
