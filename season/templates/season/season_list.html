<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seasons</title>
</head>
<body>
    <h1>Seasons</h1>

    {% for season in seasons %}
        <div>
            <a href="{% url 'chapter_list' season.pk %}"><strong>{{ season.name }}</strong></a>
            {% if season.image_url %}
                <br>
                <img src="{{ season.image_url }}" alt="{{ season.name }}" width="200">
            {% endif %}
        </div>
        <hr>
    {% empty %}
        <p>No hay seasons aún.</p>
    {% endfor %}

    <a href="{% url 'season_create' %}">Agregar Season</a>
</body>
</html>
