<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Chapter - {{ season.name }}</title>
</head>
<body>
    <h1>Nuevo Chapter en {{ season.name }}</h1>

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_number">Número</label>
            <input type="number" name="number" id="id_number" placeholder="Número del chapter">
            {{ form.number.errors }}
        </div>
        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'chapter_list' season.pk %}">Volver a Chapters</a>
</body>
</html>
