<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Draga Data - {{ season.name }}</title>
</head>
<body>
    <h1>Agregar Draga a {{ season.name }}</h1>

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_draga">Draga</label>
            {{ form.draga }}
            {{ form.draga.errors }}
        </div>
        <div>
            <label for="id_image_url">URL de imagen</label>
            <input type="url" name="image_url" id="id_image_url" placeholder="https://...">
            {{ form.image_url.errors }}
        </div>
        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'chapter_list' season.pk %}">Volver a Chapters</a>
</body>
</html>
