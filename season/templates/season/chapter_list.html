<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chapters - {{ season.name }}</title>
</head>
<body>
    <h1>Chapters de {{ season.name }}</h1>

    {% for chapter in chapters %}
        <div>
            <strong>Chapter {{ chapter.number }}</strong>
        </div>
        <hr>
    {% empty %}
        <p>No hay chapters aún.</p>
    {% endfor %}

    <a href="{% url 'chapter_create' season.pk %}">Agregar Chapter</a>
    <br>
    <a href="{% url 'draga_data_create' season.pk %}">Agregar Draga Data</a>
    <br>
    <a href="{% url 'season_list' %}">Volver a Seasons</a>
</body>
</html>
