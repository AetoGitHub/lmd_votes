<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Season</title>
</head>
<body>
    <h1>Nueva Season</h1>

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_name">Nombre</label>
            <input type="text" name="name" id="id_name" placeholder="Nombre de la season">
            {{ form.name.errors }}
        </div>
        <div>
            <label for="id_image_url">URL de imagen</label>
            <input type="url" name="image_url" id="id_image_url" placeholder="https://...">
            {{ form.image_url.errors }}
        </div>
        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'season_list' %}">Volver a la lista</a>
</body>
</html>
