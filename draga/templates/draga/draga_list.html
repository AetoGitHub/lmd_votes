<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dragas</title>
</head>
<body>
    <h1>Dragas</h1>

    {% for draga in dragas %}
        <div>
            <strong>{{ draga.name }}</strong>
            {% if draga.image %}
                <br>
                <img src="{{ draga.image }}" alt="{{ draga.name }}" width="200">
            {% endif %}
        </div>
        <hr>
    {% empty %}
        <p>No hay dragas aún.</p>
    {% endfor %}

    <a href="{% url 'draga_create' %}">Agregar Draga</a>
    <br>
    <a href="{% url 'home' %}">Volver a Home</a>
</body>
</html>
