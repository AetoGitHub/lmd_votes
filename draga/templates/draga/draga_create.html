<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Draga</title>
</head>
<body>
    <h1>Nueva Draga</h1>

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_name">Nombre</label>
            <input type="text" name="name" id="id_name" placeholder="Nombre de la draga">
            {{ form.name.errors }}
        </div>
        <div>
            <label for="id_image">URL de imagen</label>
            <input type="url" name="image" id="id_image" placeholder="https://...">
            {{ form.image.errors }}
        </div>
        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'draga_list' %}">Volver a la lista</a>
</body>
</html>
