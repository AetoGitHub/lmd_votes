<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Mensaje</title>
</head>
<body>
    <h1>Nuevo Mensaje</h1>

    <form method="post">
        {% csrf_token %}

        <div>
            <label for="id_nombre">Nombre</label>
            <input type="text" name="nombre" id="id_nombre" placeholder="Tu nombre">
            {{ form.nombre.errors }}
        </div>

        <div>
            <label for="id_texto">Texto</label>
            <textarea name="texto" id="id_texto" rows="4" placeholder="Escribe tu mensaje..."></textarea>
            {{ form.texto.errors }}
        </div>

        {{ form.non_field_errors }}

        <button type="submit">Guardar</button>
    </form>

    <a href="{% url 'mensaje_lista' %}">Ver lista</a>
</body>
</html>
