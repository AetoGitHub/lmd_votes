<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensajes</title>
</head>
<body>
    <h1>Mensajes guardados</h1>

    {% for mensaje in mensajes %}
        <div>
            <strong>{{ mensaje.nombre }}</strong>
            <p>{{ mensaje.texto }}</p>
            <small>{{ mensaje.creado }}</small>
        </div>
        <hr>
    {% empty %}
        <p>No hay mensajes aún.</p>
    {% endfor %}

    <a href="{% url 'mensaje_nuevo' %}">Agregar mensaje</a>
</body>
</html>
